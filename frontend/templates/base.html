<!DOCTYPE html>
<html lang="en" class="dark" style="overflow-x:hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ app_name }}{% endblock %}</title>
    
    <!-- TailwindCSS CDN - utility-first CSS framework -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Alpine.js CDN - lightweight reactivity (like React but no build step) -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- Inter font for clean typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Lucide icons - lightweight icon library -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    
    <script>
        // TailwindCSS custom configuration for dark theme with glassmorphism
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50:  '#eef2ff',
                            100: '#e0e7ff',
                            200: '#c7d2fe',
                            300: '#a5b4fc',
                            400: '#818cf8',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                            800: '#3730a3',
                            900: '#312e81',
                        },
                        cyber: {
                            blue: '#00d4ff',
                            purple: '#a855f7',
                            pink: '#ec4899',
                            green: '#10b981',
                            amber: '#f59e0b',
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'fade-in': 'fadeIn 0.6s ease-out both',
                        'slide-up': 'slideUp 0.5s ease-out both',
                        'slide-up-delay-1': 'slideUp 0.5s ease-out 0.1s both',
                        'slide-up-delay-2': 'slideUp 0.5s ease-out 0.2s both',
                        'slide-up-delay-3': 'slideUp 0.5s ease-out 0.3s both',
                        'glow': 'glow 2s ease-in-out infinite alternate',
                        'gradient-shift': 'gradientShift 4s ease infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'float-delay': 'float 6s ease-in-out 2s infinite',
                        'bounce-subtle': 'bounceSubtle 2s infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(30px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        glow: {
                            '0%': { boxShadow: '0 0 5px rgba(99, 102, 241, 0.2), 0 0 10px rgba(99, 102, 241, 0.1)' },
                            '100%': { boxShadow: '0 0 20px rgba(99, 102, 241, 0.4), 0 0 40px rgba(99, 102, 241, 0.2)' },
                        },
                        gradientShift: {
                            '0%, 100%': { backgroundPosition: '0% 50%' },
                            '50%': { backgroundPosition: '100% 50%' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        bounceSubtle: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(6px)' },
                        },
                    }
                }
            }
        }
    </script>
    
    <style>
        /* ---- Glassmorphism base styles ---- */
        /* These create the frosted glass effect per DESIGN_PRINCIPLES.md */
        .glass {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .glass-light {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .glass-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s ease;
        }
        
        .glass-card:hover {
            background: rgba(30, 41, 59, 0.6);
            border-color: rgba(99, 102, 241, 0.3);
            transform: translateY(-2px);
        }
        
        /* ---- Gradient backgrounds ---- */
        .bg-gradient-dark {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
        }
        
        .bg-mesh {
            background-color: #0f172a;
            background-image: 
                radial-gradient(at 40% 20%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 80% 0%, rgba(139, 92, 246, 0.1) 0px, transparent 50%),
                radial-gradient(at 0% 50%, rgba(59, 130, 246, 0.1) 0px, transparent 50%),
                radial-gradient(at 80% 50%, rgba(99, 102, 241, 0.05) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(139, 92, 246, 0.08) 0px, transparent 50%);
        }
        
        /* ---- Score badges ---- */
        .score-high { color: #34d399; }
        .score-medium { color: #fbbf24; }
        .score-low { color: #f87171; }
        
        /* ---- Agent status indicators ---- */
        .agent-running { 
            color: #60a5fa;
            animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .agent-completed { color: #34d399; }
        .agent-failed { color: #f87171; }
        
        /* ---- Timeline connector line ---- */
        .timeline-line {
            position: absolute;
            left: 18px;
            top: 36px;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, rgba(99, 102, 241, 0.3), transparent);
        }
        
        /* ---- Custom scrollbar for dark theme ---- */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.3);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(99, 102, 241, 0.5);
        }
        
        /* ---- Loading shimmer effect ---- */
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .shimmer {
            background: linear-gradient(90deg, rgba(30,41,59,0.4) 25%, rgba(51,65,85,0.4) 50%, rgba(30,41,59,0.4) 75%);
            background-size: 200% 100%;
            animation: shimmer 2s ease-in-out infinite;
        }
        
        /* ---- Progress bar animation ---- */
        .progress-bar {
            transition: width 0.5s ease;
        }
        
        /* ---- Gradient text utility ---- */
        .gradient-text {
            background: linear-gradient(135deg, #818cf8 0%, #a855f7 40%, #00d4ff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
        }
        
        .gradient-text-animated {
            background: linear-gradient(135deg, #818cf8 0%, #a855f7 40%, #00d4ff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: gradientShift 4s ease infinite;
        }
        
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        /* ---- Bento grid for features ---- */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }
        .bento-large { grid-column: span 2; grid-row: span 2; }
        .bento-wide { grid-column: span 2; }
        .bento-tall { grid-row: span 2; }
        @media (max-width: 768px) {
            .bento-grid { grid-template-columns: 1fr; }
            .bento-large, .bento-wide { grid-column: span 1; grid-row: span 1; }
            .bento-tall { grid-row: span 1; }
        }
        
        /* ---- Tab active indicator ---- */
        .tab-active {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(168, 85, 247, 0.2));
            border-color: rgba(99, 102, 241, 0.5);
            color: white;
        }
        
        /* ---- Glow border on hover ---- */
        .glow-border {
            position: relative;
        }
        .glow-border::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: inherit;
            background: linear-gradient(135deg, rgba(99,102,241,0.4), rgba(168,85,247,0.4), rgba(0,212,255,0.4));
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .glow-border:hover::before {
            opacity: 1;
        }
        
        /* ---- Number counter animation ---- */
        .counter-value {
            font-variant-numeric: tabular-nums;
        }
        
        /* ---- Pipeline connector line ---- */
        .pipeline-connector {
            width: 24px;
            height: 2px;
            background: linear-gradient(90deg, rgba(99,102,241,0.3), rgba(168,85,247,0.3));
        }
    </style>
    
    {% block head_extra %}{% endblock %}
</head>
<body class="bg-mesh min-h-screen text-gray-100 font-sans antialiased overflow-x-hidden">
    
    <!-- ---- Navigation Bar ---- -->
    <nav class="glass sticky top-0 z-50 px-6 py-3">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <!-- Logo & Brand -->
            <a href="/" class="flex items-center gap-3 group">
                <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-brand-500 to-purple-600 flex items-center justify-center shadow-lg shadow-brand-500/20 group-hover:shadow-brand-500/40 transition-shadow">
                    <i data-lucide="search" class="w-5 h-5 text-white"></i>
                </div>
                <div>
                    <span class="text-lg font-bold text-white">{{ app_name }}</span>
                    <span class="text-xs text-gray-400 ml-2">v{{ app_version }}</span>
                </div>
            </a>
            
            <!-- Nav Links -->
            <div class="flex items-center gap-4">
                <a href="/" class="text-sm text-gray-300 hover:text-white transition-colors px-3 py-1.5 rounded-lg hover:bg-white/5">
                    <i data-lucide="home" class="w-4 h-4 inline mr-1"></i> Home
                </a>
                <a href="/docs" target="_blank" class="text-sm text-gray-300 hover:text-white transition-colors px-3 py-1.5 rounded-lg hover:bg-white/5">
                    <i data-lucide="book-open" class="w-4 h-4 inline mr-1"></i> API Docs
                </a>
                <div class="w-2 h-2 rounded-full bg-green-400 animate-pulse-slow" title="System Healthy"></div>
            </div>
        </div>
    </nav>
    
    <!-- ---- Main Content ---- -->
    <main class="max-w-7xl mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>
    
    <!-- ---- Footer ---- -->
    <footer class="mt-16 py-8 px-6 border-t border-white/5">
        <div class="max-w-7xl mx-auto flex items-center justify-between text-sm text-gray-500">
            <div>
                {{ app_name }} v{{ app_version }} · Powered by
                <span class="text-brand-400">Playwright</span> +
                <span class="text-purple-400">Azure OpenAI</span>
            </div>
            <div>
                Built for the <span class="text-amber-400">Microsoft Build AI Hackathon · Agentic Web</span>
            </div>
        </div>
    </footer>
    
    <!-- Initialize Lucide icons -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });
    </script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
